name: Build for Kylin OS (Linux)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # 允许在 GitHub 网页上手动触发打包

jobs:
  build:
    name: Build Linux/amd64 and Linux/arm64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 分别打包 x86 架构和国产 ARM（飞腾/鲲鹏等）架构
        platform: [linux/amd64, linux/arm64]

    steps:
      # 1. 检出您的代码库
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Go 语言环境
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # 根据您的项目修改 Go 版本
          cache: true

      # 3. 设置 Node.js 环境 (Wails 前端打包必须项)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 4. 安装 Linux 系统的 CGO/图形界面编译依赖
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu

      # 5. 安装 Wails 命令行工具
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # 6. 设置环境变量并编译
      - name: Build with Wails
        working-directory: ./gui
        run: |
          # 动态获取当前的架构参数
          PLATFORM=${{ matrix.platform }}
          
          if [ "$PLATFORM" == "linux/arm64" ]; then
            # 交叉编译 ARM 架构时，必须指定交叉编译器
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          fi
          
          # 执行 Wails 编译，输出目录一般会在 ./gui/build/bin/ 下
          wails build -platform $PLATFORM

      # 7. 重命名并收集编译好的可执行文件，防止相互覆盖
      - name: Rename Artifact
        working-directory: ./gui/build/bin
        run: |
          # 获取编译出的文件名（此处不含 .exe）
          ARCH=$(echo ${{ matrix.platform }} | cut -d'/' -f2)
          mv gui "EsSpectre_Kylin_$ARCH"

      # 8. 将编译好的文件上传为产物，供您下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsSpectre-Kylin-${{ matrix.platform }}
          path: ./gui/build/bin/EsSpectre_Kylin_*
