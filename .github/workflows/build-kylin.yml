name: Build for Kylin OS (Linux)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-amd64:
    name: Build Linux/amd64 (x86_64)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential libgtk-3-dev libwebkit2gtk-4.0-dev \
            pkg-config unixodbc-dev curl git ca-certificates tar gzip
            
      - uses: actions/checkout@v4
      
      # Step 1: Install Wails using Go 1.23 (Requirement for Wails CLI v2.11)
      - name: Setup Go (for Wails CLI)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        
      # Step 2: Switch to Go 1.21 for App Build (for 4.4 Kernel Compatibility)
      - name: Setup Go (for App Build)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Build with Wails
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          # 动态将 go.mod 版本从 1.23 降至 1.21，防止编译器校验报错
          sed -i 's/go 1.23/go 1.21/g' gui/go.mod
          cd gui
          wails build -platform linux/amd64 -clean -ldflags "-s -w"
          
      - name: Rename Artifact
        run: |
          mv gui/build/bin/gui gui/build/bin/EsSpectre_Kylin_amd64
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsSpectre-Kylin-linux-amd64
          path: gui/build/bin/EsSpectre_Kylin_amd64

  build-arm64:
    name: Build Linux/arm64 (Kylin ARM)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      - name: Install Cross-Build Dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y curl git ca-certificates dpkg-dev tar gzip
          dpkg --add-architecture arm64
          sed -i 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal main restricted universe multiverse" > /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-updates main restricted universe multiverse" >> /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports focal-security main restricted universe multiverse" >> /etc/apt/sources.list.d/arm64.list
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu pkg-config \
            libgtk-3-dev:arm64 libwebkit2gtk-4.0-dev:arm64 unixodbc-dev:arm64
            
      - uses: actions/checkout@v4
      
      - name: Setup Go (for Wails CLI)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        
      - name: Setup Go (for App Build)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Build Frontend Natively
        run: |
          cd gui/frontend
          npm install
          npm run build
          
      - name: Build with Wails (Native Cross-Compile to ARM64)
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=arm64
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_SYSROOT_DIR=/
          sed -i 's/go 1.23/go 1.21/g' gui/go.mod
          cd gui
          wails build -platform linux/arm64 -clean -s -skipbindings -ldflags "-s -w"
          mv build/bin/gui build/bin/EsSpectre_Kylin_arm64 || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsSpectre-Kylin-linux-arm64
          path: gui/build/bin/EsSpectre_Kylin_arm64

  build-mips64el:
    name: Build Linux/mips64el (Kylin Loongson)
    runs-on: ubuntu-latest
    # 使用 Debian 10 Buster 容器，完美契合 mips64el 依赖链，避免 Ubuntu 混合架构冲突
    container:
      image: debian:10
    steps:
      - name: Setup Multi-arch and Archive Sources
        run: |
          dpkg --add-architecture mips64el
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian buster-updates main" >> /etc/apt/sources.list
          apt-get update -o Acquire::Check-Valid-Until=false || true
          
      - name: Install Dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get install -y --allow-unauthenticated \
            curl git ca-certificates tar gzip gnupg2 build-essential pkg-config \
            gcc-mips64el-linux-gnuabi64 g++-mips64el-linux-gnuabi64 \
            libgtk-3-dev:mips64el libwebkit2gtk-4.0-dev:mips64el unixodbc-dev:mips64el
            
      - uses: actions/checkout@v4
      
      - name: Setup Go (for Wails CLI)
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        
      - name: Setup Go (for App Build)
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          
      - name: Build Frontend Natively
        run: |
          cd gui/frontend
          npm install
          npm run build
          
      - name: Build with Wails (Native Cross-Compile to MIPS64EL)
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          export CC=mips64el-linux-gnuabi64-gcc
          export CXX=mips64el-linux-gnuabi64-g++
          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=mips64le
          export PKG_CONFIG_PATH=/usr/lib/mips64el-linux-gnu/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_SYSROOT_DIR=/
          sed -i 's/go 1.23/go 1.21/g' gui/go.mod
          cd gui
          wails build -platform linux/mips64le -clean -s -skipbindings -ldflags "-s -w"
          mv build/bin/gui build/bin/EsSpectre_Kylin_mips64el || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsSpectre-Kylin-linux-mips64el
          path: gui/build/bin/EsSpectre_Kylin_mips64el
