name: Build for Kylin OS (Linux)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-amd64:
    name: Build Linux/amd64 (x86_64)
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install System Dependencies for amd64
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build with Wails
        working-directory: ./gui
        run: wails build -platform linux/amd64 -clean

      - name: Rename Artifact
        working-directory: ./gui/build/bin
        run: mv gui EsSpectre_Kylin_amd64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsSpectre-Kylin-linux-amd64
          path: ./gui/build/bin/EsSpectre_Kylin_amd64

  build-arm64:
    name: Build Linux/arm64 (Kylin ARM)
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build Frontend Natively
        working-directory: ./gui/frontend
        run: |
          npm install
          npm run build

      - name: Pre-build Wails CLI & Download Go Modules on Host
        run: |
          # 1. 在极速的宿主机 (AMD64) 交叉编译 ARM64 版的 Wails 工具，避免在 QEMU 中龟速编译
          env GOOS=linux GOARCH=arm64 go build -o ./wails-cli-arm64 github.com/wailsapp/wails/v2/cmd/wails@latest
          chmod +x ./wails-cli-arm64
          # 2. 在极速的宿主机把所有 Go 包下载到本地目录缓存，供后续内部容器直接读取，避免 QEMU 龟速 I/O
          mkdir -p ./WORKSPACE_GOPATH
          cd gui
          env GOPATH=$PWD/../WORKSPACE_GOPATH go mod download

      # 使用成熟的 QEMU 模拟真实 ARM64 环境，以避免繁琐易错的 CGO 交叉编译头文件解析问题
      - name: Build on arm64 via QEMU
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu20.04
          # 在容器内映射当前源码盘
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q -y
            # 安装 ARM64 原生的 GTK/WebKit 开发依赖和编译链 (移除 nodejs/npm 以提高速度)
            DEBIAN_FRONTEND=noninteractive apt-get install -y curl git wget sudo \
                libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config
            # 安装 ARM64 版本 Go 1.21
            wget https://go.dev/dl/go1.21.8.linux-arm64.tar.gz
            tar -C /usr/local -xzf go1.21.8.linux-arm64.tar.gz
          run: |
            export PATH=$PATH:/usr/local/go/bin
            # 指向我们在宿主机（Host）准备好的高速缓存目录
            export GOPATH=$PWD/WORKSPACE_GOPATH
            export GOCACHE=$PWD/WORKSPACE_GOPATH/build-cache
            
            cd gui
            # 直接运行我们在 Host 编译出来的纯 ARM64 的 wails 可执行文件
            ../wails-cli-arm64 build -platform linux/arm64 -clean -s -skipbindings
            mv build/bin/gui build/bin/EsSpectre_Kylin_arm64

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsSpectre-Kylin-linux-arm64
          path: ./gui/build/bin/EsSpectre_Kylin_arm64
